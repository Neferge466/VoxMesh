# Coturn TURN/STUN server config for VoxMesh
# WebRTC clients use this when direct P2P fails (symmetric NAT, mobile networks).

listening-port=3478
tls-listening-port=5349

# Relay interface — bind to all interfaces inside Docker
listening-ip=0.0.0.0
relay-ip=0.0.0.0
external-ip=${TURN_EXTERNAL_IP:-auto}

fingerprint
lt-cred-mech
realm=voxmesh

# Use REST API auth (time-limited credentials signed with shared secret)
use-auth-secret
static-auth-secret=${TURN_SECRET:-voxmesh-turn-dev-secret-change-me}

# Limit relay bandwidth and lifetime
max-bps=1000000
stale-nonce=600

# Disable multicast on loopback
no-multicast-peers

# Logging
verbose
log-file=stdout
