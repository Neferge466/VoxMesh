global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'emqx'
    static_configs:
      - targets: ['emqx:18083']
    metrics_path: /api/v5/prometheus/stats

  - job_name: 'voxmesh-services'
    static_configs:
      - targets:
          - 'auth-service:8080'
          - 'channel-service:8080'
          - 'ws-gateway:8080'
          - 'gateway-coordinator:8080'
    metrics_path: /metrics

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
