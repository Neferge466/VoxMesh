name: Build and Push Docker Images

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: auth-service
            dockerfile: services/auth/Dockerfile
          - service: channel-service
            dockerfile: services/channel/Dockerfile
          - service: ws-gateway
            dockerfile: services/ws-gateway/Dockerfile
          - service: audio-mixer
            dockerfile: services/audio-mixer/Dockerfile
          - service: presence-manager
            dockerfile: services/presence/Dockerfile
          - service: gateway-coordinator
            dockerfile: services/gateway-coordinator/Dockerfile
          - service: command-handler
            dockerfile: services/command-handler/Dockerfile
          - service: notification-service
            dockerfile: services/notification/Dockerfile
          - service: frontend
            dockerfile: web-client/Dockerfile
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/voxmesh-${{ matrix.service }}:latest
