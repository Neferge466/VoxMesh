name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Go Backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth
          - channel
          - ws-gateway
          - gateway-coordinator
          - audio-mixer
          - presence
          - command-handler
          - notification
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: services/${{ matrix.service }}/go.sum
      - name: Build (audio-mixer CGO)
        if: matrix.service == 'audio-mixer'
        run: |
          sudo apt-get update && sudo apt-get install -y libopus-dev pkg-config
          CGO_ENABLED=1 go build ./...
      - name: Vet
        if: matrix.service != 'audio-mixer'
        run: go vet ./...
      - name: Test
        if: matrix.service != 'audio-mixer'
        run: go test ./... -count=1 -timeout 60s

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web-client/package-lock.json
      - name: Install
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit

  packages-tests:
    name: Shared Packages Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/pkg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Test
        run: go test ./... -count=1 -v
