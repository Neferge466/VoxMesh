%%--------------------------------------------------------------------
%% EMQX ACL Configuration - VoxMesh
%%
%% This file defines static ACL rules. Dynamic rules are managed
%% via the PostgreSQL ACL plugin (see migrations/002_seed_acl.up.sql).
%%
%% Static rules here serve as a fallback and for anonymous connections.
%%--------------------------------------------------------------------

%% Deny all by default
{deny, all}.

%% Anonymous connections (no username/password) — used only for health checks
{allow, {username, {re, "^anon.*"}}, all, ["$SYS/#"]}.
{allow, {username, {re, "^anon.*"}}, subscribe, ["voxmesh/system/version", "voxmesh/system/broadcast"]}.

%% Gateway rules (static fallback; normally managed via DB)
%% Pattern: gw_* can pub/sub to their own namespace
{allow, {username, {re, "^gw_.*"}}, all, ["voxmesh/gateways/${username}/#"]}.

%% Service accounts (static fallback)
{allow, {username, {re, "^svc_.*"}}, all, ["voxmesh/#"]}.
{allow, {username, {re, "^svc_.*"}}, all, ["$SYS/#"]}.
